<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a2e;
      background: #fafafa;
    }
    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #6b7280;
      flex-shrink: 0;
    }
    .dot.active { background: #ef4444; animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .body { padding: 16px; }
    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .meta-item {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 8px 10px;
    }
    .meta-label { font-size: 10px; text-transform: uppercase; color: #6b7280; letter-spacing: 0.5px; }
    .meta-value { font-size: 16px; font-weight: 600; margin-top: 2px; }
    .info {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 14px;
      font-size: 12px;
    }
    .info-row { display: flex; justify-content: space-between; padding: 3px 0; }
    .info-row .label { color: #6b7280; }
    .info-row .val { font-weight: 500; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .company-input {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      margin-bottom: 14px;
      outline: none;
    }
    .company-input:focus { border-color: #3b82f6; }
    .buttons { display: flex; gap: 8px; }
    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-start { background: #22c55e; color: #fff; }
    .btn-stop { background: #ef4444; color: #fff; }
    .btn-export { background: #3b82f6; color: #fff; }
    .status-text {
      text-align: center;
      padding: 10px 0 4px;
      font-size: 11px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot" id="statusDot"></div>
    <h1>DEJSOL CAPTURE</h1>
  </div>
  <div class="body">
    <input class="company-input" id="companyInput" placeholder="Company name (auto-detected)" />

    <div class="meta">
      <div class="meta-item">
        <div class="meta-label">Fields</div>
        <div class="meta-value" id="fieldCount">0</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Values</div>
        <div class="meta-value" id="valueCount">0</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Steps</div>
        <div class="meta-value" id="stepCount">0</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Duration</div>
        <div class="meta-value" id="duration">0:00</div>
      </div>
    </div>

    <div class="info">
      <div class="info-row">
        <span class="label">ATS</span>
        <span class="val" id="atsType">—</span>
      </div>
      <div class="info-row">
        <span class="label">Conditional</span>
        <span class="val" id="conditionalCount">0</span>
      </div>
      <div class="info-row">
        <span class="label">Submitted</span>
        <span class="val" id="submitted">No</span>
      </div>
    </div>

    <div class="buttons">
      <button class="btn btn-start" id="btnStart">Start</button>
      <button class="btn btn-stop" id="btnStop" disabled>Stop</button>
      <button class="btn btn-export" id="btnExport" disabled>Export</button>
    </div>

    <div class="status-text" id="statusText">Ready to capture</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
