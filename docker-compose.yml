version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: dejsol
      POSTGRES_PASSWORD: dejsol
      POSTGRES_DB: dejsol
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dejsol"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=dejsol
      - POSTGRES_PWD=dejsol
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8080:8080"

  # Temporal worker — polls the "apply-workflow" task queue and executes
  # applyWorkflow + activities.  Build the repo first: npm run build
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - BRIGHT_DATA_AUTH=${BRIGHT_DATA_AUTH:-}
      - DATABASE_URL=${DATABASE_URL:-postgresql://dejsol:dejsol@postgres:5432/dejsol?schema=public}
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
